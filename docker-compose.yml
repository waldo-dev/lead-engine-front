services:
  lead-engine-front:
    container_name: lead-engine-front
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL pública del API (desde el navegador del usuario).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Define NEXT_PUBLIC_API_URL en .env}
    ports:
      - "${FRONT_PORT:-3000}:3000"
    restart: unless-stopped
