# API — lead-engine.chilsmart.com → contenedor lead-engine-api (puerto 5008)
#
# Si el back ya tiene otro vhost, compara y unifica. Referencia para CORS + proxy.
#
# Instalación:
#   sudo cp deploy/nginx/lead-engine.chilsmart.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/lead-engine.chilsmart.com.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d lead-engine.chilsmart.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name lead-engine.chilsmart.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lead-engine.chilsmart.com;

    ssl_certificate /etc/letsencrypt/live/lead-engine.chilsmart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lead-engine.chilsmart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
