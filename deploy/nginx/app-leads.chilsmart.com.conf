# Front — app-leads.chilsmart.com → contenedor lead-engine-front (puerto 3000)
#
# Instalación en la VPS:
#   sudo cp deploy/nginx/app-leads.chilsmart.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/app-leads.chilsmart.com.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app-leads.chilsmart.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app-leads.chilsmart.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app-leads.chilsmart.com;

    # Certbot rellena estas rutas al ejecutar certbot --nginx
    ssl_certificate /etc/letsencrypt/live/app-leads.chilsmart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-leads.chilsmart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
